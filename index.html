<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat Assistant</title>
    <!-- Tailwind CSS for sleek UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for interactive UI icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js for formatting Gemini's markdown responses nicely -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Custom scrollbar for chat history */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }
        /* Custom slide-in animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-bubble {
            animation: slideIn 0.25s ease-out forwards;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans">

    <!-- Header / Control Panel -->
    <header class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-md sticky top-0 z-10 px-6 py-4 flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fa-solid fa-wand-magic-sparkles text-white text-lg"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-none tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-white via-zinc-200 to-zinc-400">Gemini Assistant</h1>
                <span class="text-xs text-indigo-400 font-medium">Multi-Turn Chat History Enabled</span>
            </div>
        </div>

        <!-- Configuration Settings inside Header -->
        <div class="flex flex-wrap items-center gap-3">
            <!-- Model Selection -->
            <div class="relative">
                <select id="modelSelect" class="bg-zinc-800 border border-zinc-700 text-zinc-200 rounded-lg text-xs px-3 py-2 pr-8 focus:outline-none focus:border-indigo-500 transition cursor-pointer appearance-none">
                    <option value="gemini-2.5-flash">gemini-2.5-flash (Recommended)</option>
                    <option value="gemini-1.5-flash">gemini-1.5-flash</option>
                    <option value="gemini-3.5-flash">gemini-3.5-flash</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-2.5 top-1/2 -translate-y-1/2 text-[10px] text-zinc-400 pointer-events-none"></i>
            </div>
            <!-- API Key Input -->
            <div class="flex items-center bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-1.5 focus-within:border-indigo-500 transition">
                <i class="fa-solid fa-key text-zinc-400 text-xs px-1"></i>
                <input type="password" id="apiKeyInput" value="Wright here API KEY" placeholder="Enter Gemini API Key" class="bg-transparent text-xs text-zinc-200 focus:outline-none w-48 px-2" />
            </div>
            <!-- Reset Button -->
            <button id="clearChatBtn" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 border border-zinc-700 px-3 py-2 rounded-lg text-xs font-medium transition flex items-center gap-1.5">
                <i class="fa-solid fa-rotate-left"></i> Reset
            </button>
        </div>
    </header>

    <!-- Chat Interface Container -->
    <main class="flex-1 max-w-4xl w-full mx-auto flex flex-col p-4 md:p-6 overflow-hidden">
        <!-- Chat History Window -->
        <div id="chatHistory" class="flex-1 overflow-y-auto space-y-6 pr-2 py-4">
            <!-- Welcome Message -->
            <div class="flex items-start gap-4">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-xs shrink-0 shadow shadow-indigo-600/50">
                    <i class="fa-solid fa-robot text-white"></i>
                </div>
                <div class="space-y-1 max-w-[85%]">
                    <span class="text-xs font-semibold text-indigo-400 uppercase tracking-wider">Gemini</span>
                    <div class="bg-zinc-900 border border-zinc-800/80 rounded-2xl px-4 py-3 text-zinc-300 text-sm shadow-sm leading-relaxed">
                        Hello! I am ready to help. Your chat history is maintained automatically inside your session context. What's on your mind?
                    </div>
                </div>
            </div>
        </div>

        <!-- Typing Indicator (hidden by default) -->
        <div id="typingIndicator" class="hidden flex items-start gap-4 py-2">
            <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-xs shrink-0">
                <i class="fa-solid fa-robot text-white"></i>
            </div>
            <div class="space-y-1">
                <span class="text-xs font-semibold text-indigo-400">Gemini</span>
                <div class="bg-zinc-900 border border-zinc-800/80 rounded-2xl px-4 py-2.5 text-zinc-400 text-sm flex items-center gap-1.5 shadow-sm">
                    <span class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce"></span>
                    <span class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                    <span class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                </div>
            </div>
        </div>

        <!-- Input Bar Area -->
        <div class="mt-4">
            <form id="chatForm" class="flex gap-2 bg-zinc-900 border border-zinc-800 p-2 rounded-2xl shadow-xl focus-within:border-indigo-500 transition-all">
                <input type="text" id="userInput" placeholder="Ask me anything..." required autocomplete="off" 
                    class="flex-1 bg-transparent px-4 py-3 text-sm text-zinc-100 focus:outline-none placeholder-zinc-500" />
                <button type="submit" class="bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white px-5 rounded-xl text-sm font-semibold transition duration-200 flex items-center justify-center gap-1.5 shadow-lg shadow-indigo-600/10">
                    <span>Send</span>
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </form>
            <p class="text-[10px] text-zinc-600 text-center mt-2">
                This app runs completely inside your client web browser. Keep your API keys protected.
            </p>
        </div>
    </main>

    <!-- JS Logic representing the Node.js Chat Code -->
    <script>
        // Array to automatically maintain conversation history (just like your original code)
        let chatHistory = [];

        const chatHistoryDiv = document.getElementById("chatHistory");
        const chatForm = document.getElementById("chatForm");
        const userInput = document.getElementById("userInput");
        const typingIndicator = document.getElementById("typingIndicator");
        const clearChatBtn = document.getElementById("clearChatBtn");
        const apiKeyInput = document.getElementById("apiKeyInput");
        const modelSelect = document.getElementById("modelSelect");

        // Helper: Append a new message to the chat interface
        function appendMessage(role, text) {
            const isUser = role === "user";
            const messageWrapper = document.createElement("div");
            messageWrapper.className = `flex items-start gap-4 message-bubble ${isUser ? "justify-end" : ""}`;

            const avatarHtml = isUser 
                ? `<div class="w-8 h-8 rounded-lg bg-zinc-700 flex items-center justify-center text-xs shrink-0 order-2 shadow"><i class="fa-solid fa-user text-white"></i></div>`
                : `<div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-xs shrink-0 shadow shadow-indigo-600/50"><i class="fa-solid fa-robot text-white"></i></div>`;

            const parsedText = isUser ? escapeHTML(text) : marked.parse(text);

            messageWrapper.innerHTML = `
                ${avatarHtml}
                <div class="space-y-1 max-w-[85%] ${isUser ? "order-1 flex flex-col items-end" : ""}">
                    <span class="text-xs font-semibold ${isUser ? "text-zinc-400" : "text-indigo-400"} uppercase tracking-wider">
                        ${isUser ? "You" : "Gemini"}
                    </span>
                    <div class="${isUser ? "bg-zinc-800 border-zinc-700 text-zinc-200" : "bg-zinc-900 border-zinc-800/80 text-zinc-300"} border rounded-2xl px-4 py-3 text-sm shadow-sm leading-relaxed prose prose-invert max-w-none">
                        ${parsedText}
                    </div>
                </div>
            `;
            
            chatHistoryDiv.appendChild(messageWrapper);
            scrollToBottom();
        }

        // Helper to escape HTML tags so raw inputs don't render as markup
        function escapeHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // Helper: Smooth scrolling to latest messages
        function scrollToBottom() {
            chatHistoryDiv.scrollTo({
                top: chatHistoryDiv.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Clear Chat Function
        clearChatBtn.addEventListener("click", () => {
            chatHistory = [];
            chatHistoryDiv.innerHTML = `
                <div class="flex items-start gap-4">
                    <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-xs shrink-0 shadow shadow-indigo-600/50">
                        <i class="fa-solid fa-robot text-white"></i>
                    </div>
                    <div class="space-y-1 max-w-[85%]">
                        <span class="text-xs font-semibold text-indigo-400 uppercase tracking-wider">Gemini</span>
                        <div class="bg-zinc-900 border border-zinc-800/80 rounded-2xl px-4 py-3 text-zinc-300 text-sm shadow-sm leading-relaxed">
                            Chat session has been reset. All context history is cleared. How can I help you now?
                        </div>
                    </div>
                </div>
            `;
        });

        // Handle Chat Submission
        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const messageText = userInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            const selectedModel = modelSelect.value;

            if (!messageText) return;
            if (!apiKey) {
                alert("Please configure a Gemini API key first.");
                return;
            }

            // 1. Render User Message immediately
            appendMessage("user", messageText);
            userInput.value = "";

            // 2. Add message to the API context history array (mirroring the Node SDK)
            chatHistory.push({
                role: "user",
                parts: [{ text: messageText }]
            });

            // 3. Display loading/typing indicator
            typingIndicator.classList.remove("hidden");
            scrollToBottom();

            try {
                // 4. API Request matching your specified curl format
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: chatHistory
                    })
                });

                if (!response.ok) {
                    const errorDetails = await response.json();
                    throw new Error(errorDetails.error?.message || "Failed API call");
                }

                const data = await response.json();
                
                // Extract response text back from nested structure
                const botReply = data.candidates[0].content.parts[0].text;

                // 5. Hide typing indicator & Render Bot Response
                typingIndicator.classList.add("hidden");
                appendMessage("model", botReply);

                // 6. Append Bot reply to local history to maintain continuous context
                chatHistory.push({
                    role: "model",
                    parts: [{ text: botReply }]
                });

            } catch (error) {
                console.error("API Fetch Error:", error);
                typingIndicator.classList.add("hidden");
                
                // Render error state cleanly inside chat bubble
                const errorWrapper = document.createElement("div");
                errorWrapper.className = "flex items-start gap-4 message-bubble";
                errorWrapper.innerHTML = `
                    <div class="w-8 h-8 rounded-lg bg-rose-900/50 flex items-center justify-center text-xs shrink-0"><i class="fa-solid fa-triangle-exclamation text-rose-400"></i></div>
                    <div class="space-y-1">
                        <span class="text-xs font-semibold text-rose-400">System Error</span>
                        <div class="bg-rose-950/30 border border-rose-900/50 text-rose-300 rounded-2xl px-4 py-3 text-sm">
                            Error contacting Gemini API: ${error.message}. Please verify your API Key and internet connection.
                        </div>
                    </div>
                `;
                chatHistoryDiv.appendChild(errorWrapper);
                scrollToBottom();

                // Rollback the last unsaved user history item if API failed
                chatHistory.pop();
            }
        });
    </script>
</body>
</html>
